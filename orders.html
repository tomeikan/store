<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的訂單 - 我的小店</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">← 返回</div>
  </nav>
  <main class="container">
    <div class="section-title" style="margin-bottom:16px;">我的訂單</div>
    <div id="orders-wrap"><div class="loading">載入中...</div></div>
  </main>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.querySelector('.nav-logo').onclick = () => history.back();
    async function loadOrders() {
      const token = getToken();
      if (!token) { location.href = 'profile.html'; return; }
      try {
        const res = await fetch(`${CONFIG.API_URL}/api/orders`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const orders = await res.json();
        const wrap = document.getElementById('orders-wrap');
        if (!orders.length) { wrap.innerHTML = '<div class="loading">尚無訂單</div>'; return; }
        const statusMap = { pending: ['status-pending','待付款'], paid: ['status-shipped','已付款'], shipped: ['status-shipped','已出貨'], done: ['status-done','已完成'] };
        wrap.innerHTML = orders.map(o => {
          const [cls, label] = statusMap[o.status] || ['status-pending', o.status];
          return `
            <div class="order-card">
              <div class="order-header">
                <span class="order-id">訂單 #${o.id}</span>
                <span class="order-status ${cls}">${label}</span>
              </div>
              <div style="font-size:13px;color:#888;margin-bottom:8px;">${new Date(o.created_at).toLocaleString('zh-TW')}</div>
              ${o.items.map(i => `<div style="font-size:14px;margin-bottom:4px;">${i.emoji || '📦'} ${i.name} × ${i.qty}</div>`).join('')}
              <div style="text-align:right;font-size:16px;font-weight:700;color:#c85a1e;margin-top:8px;">NT$${o.total.toLocaleString()}</div>
            </div>`;
        }).join('');
      } catch (e) {
        document.getElementById('orders-wrap').innerHTML = '<div class="error-msg">載入失敗</div>';
      }
    }
    loadOrders();
  </script>
</body>
</html>
