<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品管理 - 後台</title>
  <link rel="stylesheet" href="admin.css" />
  <style>
    .img-upload-area { border:2px dashed #d0e8f8;border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:#fafcff; }
    .img-upload-area:hover { border-color:#378add;background:#f0f7ff; }
    .img-upload-icon { font-size:32px;margin-bottom:8px; }
    .img-upload-text { font-size:13px;color:#aaa; }
    .img-upload-text span { color:#378add;text-decoration:underline; }
    .img-preview-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px; }
    .img-preview-item { position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid #e8f0f8;background:#f8fbff; }
    .img-preview-item img { width:100%;height:100%;object-fit:cover;display:block; }
    .img-preview-remove { position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,0.55);border-radius:50%;color:white;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center; }
    .img-main-badge { position:absolute;bottom:4px;left:4px;background:#378add;color:white;font-size:9px;padding:2px 6px;border-radius:8px; }
    .upload-progress { height:3px;background:#e8f0f8;border-radius:2px;margin-top:8px;overflow:hidden;display:none; }
    .upload-progress-bar { height:100%;background:#378add;transition:width 0.3s;width:0%; }
    .uploading-msg { font-size:12px;color:#378add;margin-top:6px;display:none; }
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-icon">🛍</div><span class="sidebar-logo-text">後台管理</span></div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">主選單</div>
    <a href="index.html" class="sidebar-item"><span class="sidebar-item-icon">📊</span>總覽</a>
    <a href="products.html" class="sidebar-item active"><span class="sidebar-item-icon">📦</span>商品管理</a>
    <a href="orders.html" class="sidebar-item"><span class="sidebar-item-icon">🧾</span>訂單管理</a>
    <a href="notices.html" class="sidebar-item"><span class="sidebar-item-icon">📢</span>公告管理</a>
    <a href="users.html" class="sidebar-item"><span class="sidebar-item-icon">👥</span>會員管理</a>
  </div>
  <div class="sidebar-footer"><a href="../index.html">← 前往前台</a></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">商品管理</div>
    <div class="topbar-right"><button class="btn-primary" onclick="openDrawer(null)">+ 新增商品</button></div>
  </div>
  <div class="content">
    <div class="product-table-wrap">
      <div class="table-header">
        <input class="table-search" placeholder="搜尋商品名稱..." oninput="filterTable(this.value)" />
        <span style="font-size:12px;color:#aaa;" id="product-count"></span>
      </div>
      <table>
        <thead><tr><th>圖片</th><th>商品名稱</th><th>分類</th><th>類型</th><th>售價</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="products-tbody"><tr><td colspan="7" style="text-align:center;color:#aaa;padding:32px;">載入中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">新增商品</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <input type="hidden" id="f-id" />

    <div class="form-section">
      <div class="form-section-title">商品圖片</div>
      <div class="img-upload-area" id="upload-area" onclick="document.getElementById('img-file').click()" ondragover="event.preventDefault();this.style.borderColor='#378add'" ondragleave="this.style.borderColor='#d0e8f8'" ondrop="handleDrop(event)">
        <div class="img-upload-icon">📷</div>
        <div class="img-upload-text">拖曳圖片到此，或<span>點擊選擇檔案</span></div>
        <div class="img-upload-text" style="margin-top:4px;font-size:11px;">支援 JPG、PNG、WEBP，最多 5 張</div>
      </div>
      <input type="file" id="img-file" accept="image/jpeg,image/png,image/webp" multiple style="display:none" onchange="handleImgSelect(this.files)" />
      <div class="upload-progress" id="upload-progress"><div class="upload-progress-bar" id="upload-bar"></div></div>
      <div class="uploading-msg" id="uploading-msg">⏳ 上傳中，請稍候...</div>
      <div class="img-preview-grid" id="img-preview"></div>
      <div style="font-size:11px;color:#aaa;margin-top:8px;">第一張為主圖，點 ✕ 可刪除</div>
    </div>

    <div class="form-section">
      <div class="form-section-title">基本資訊</div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label required">商品類型</label>
          <div class="radio-group" id="type-group">
            <div class="radio-btn active" onclick="setRadio('type','preorder',this)">預購</div>
            <div class="radio-btn" onclick="setRadio('type','instock',this)">現貨</div>
          </div>
          <input type="hidden" id="f-type" value="preorder" />
        </div>
        <div class="form-group">
          <label class="form-label required">上架狀態</label>
          <div class="radio-group" id="status-group">
            <div class="radio-btn active active-green" onclick="setRadio('status','active',this,'green')">上架</div>
            <div class="radio-btn" onclick="setRadio('status','inactive',this,'green')">下架</div>
          </div>
          <input type="hidden" id="f-status" value="active" />
        </div>
      </div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label required">分類</label>
          <select class="form-select" id="f-category" onchange="updateSubcategory()"><option value="">選擇分類</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">子分類</label>
          <select class="form-select" id="f-subcategory"><option value="">選擇子分類</option></select>
        </div>
      </div>
      <details style="margin-bottom:14px;">
        <summary style="font-size:12px;color:#378add;cursor:pointer;padding:4px 0;">管理分類與子分類</summary>
        <div style="margin-top:10px;">
          <div class="category-wrap" id="category-list"></div>
          <div class="add-cat-row"><input class="add-cat-input" id="new-cat-input" placeholder="新增分類名稱" /><button class="add-cat-btn" onclick="addCategory()">新增</button></div>
        </div>
      </details>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label required">商品名稱</label>
          <input class="form-input" id="f-name" placeholder="請輸入商品名稱" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">商品規格</div>
      <div class="spec-table">
        <div class="spec-header"><div>主規格（例如：尺寸）</div><div>子規格（例如：顏色）</div><div></div></div>
        <div id="spec-rows"></div>
      </div>
      <button class="add-spec-btn" onclick="addSpec()">+ 新增規格</button>
    </div>

    <div class="form-section">
      <div class="form-section-title">價格資訊</div>
      <div class="form-row col3">
        <div class="form-group"><label class="form-label required">售價 (NT$)</label><input class="form-input" id="f-price" type="number" placeholder="0" /></div>
        <div class="form-group"><label class="form-label">原價 (NT$)</label><input class="form-input" id="f-original" type="number" placeholder="0" /></div>
        <div class="form-group"><label class="form-label">訂金 (NT$)</label><input class="form-input" id="f-deposit" type="number" placeholder="0" /></div>
      </div>
      <div class="form-row col2">
        <div class="form-group"><label class="form-label">進貨成本 (NT$)</label><input class="form-input" id="f-cost" type="number" placeholder="0" /></div>
        <div class="form-group"><label class="form-label">廠商</label><input class="form-input" id="f-supplier" placeholder="廠商名稱" /></div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">時間資訊</div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label">預計到貨時間</label>
          <div class="date-selects">
            <select class="form-select" id="f-arrive-year"></select>
            <select class="form-select" id="f-arrive-month"></select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">結單日期</label><input class="form-input" id="f-deadline" type="date" /></div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">其他資訊</div>
      <div class="form-group">
        <label class="form-label required">商品說明</label>
        <textarea class="form-textarea" id="f-desc" placeholder="描述商品特色、材質、注意事項等..."></textarea>
      </div>
      <div class="form-row col2" style="margin-top:12px;">
        <div class="form-group">
          <label class="form-label">標示為特賣</label>
          <div class="radio-group" id="sale-group">
            <div class="radio-btn" onclick="setRadio('sale','true',this,'green')">是</div>
            <div class="radio-btn active active-green" onclick="setRadio('sale','false',this,'green')">否</div>
          </div>
          <input type="hidden" id="f-sale" value="false" />
        </div>
      </div>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="btn-cancel" onclick="closeDrawer()">取消</button>
    <button class="btn-primary" id="save-btn" onclick="doSaveProduct()">儲存商品</button>
  </div>
</div>

<script src="../config.js"></script>
<script src="admin.js"></script>
<script>
// ===== 圖片 =====
let uploadedImages = [];
let isUploading = false;

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-area').style.borderColor = '#d0e8f8';
  handleImgSelect(e.dataTransfer.files);
}

async function handleImgSelect(files) {
  if (isUploading) { alert('請等待目前圖片上傳完成'); return; }
  const arr = Array.from(files);
  const remaining = 5 - uploadedImages.length;
  if (remaining <= 0) { alert('最多只能上傳 5 張圖片'); return; }
  for (const file of arr.slice(0, remaining)) {
    if (file.size > 10 * 1024 * 1024) { alert(file.name + ' 超過 10MB'); continue; }
    await uploadOne(file);
  }
  document.getElementById('img-file').value = '';
}

async function uploadOne(file) {
  isUploading = true;
  const prog = document.getElementById('upload-progress');
  const bar = document.getElementById('upload-bar');
  const msg = document.getElementById('uploading-msg');
  prog.style.display = 'block';
  msg.style.display = 'block';
  bar.style.width = '40%';

  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        bar.style.width = '70%';
        const res = await fetch(CONFIG.API_URL + '/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('admin_token') || '') },
          body: JSON.stringify({ base64: ev.target.result, filename: file.name, mimetype: file.type })
        });
        const data = await res.json();
        bar.style.width = '100%';
        if (data.url) {
          uploadedImages.push({ url: data.url });
          renderImgPreview();
        } else {
          alert('上傳失敗：' + (data.error || '請重試'));
        }
      } catch(err) {
        alert('上傳失敗，請確認網路連線');
      } finally {
        isUploading = false;
        setTimeout(() => { prog.style.display='none'; bar.style.width='0%'; msg.style.display='none'; }, 600);
        resolve();
      }
    };
    reader.readAsDataURL(file);
  });
}

function removeImg(i) {
  uploadedImages.splice(i, 1);
  renderImgPreview();
}

function renderImgPreview() {
  document.getElementById('img-preview').innerHTML = uploadedImages.map((img, i) => `
    <div class="img-preview-item">
      <img src="${img.url}" />
      ${i === 0 ? '<span class="img-main-badge">主圖</span>' : ''}
      <button class="img-preview-remove" onclick="removeImg(${i})">✕</button>
    </div>`).join('');
}

// ===== 開啟/關閉抽屜 =====
function openDrawer(p) {
  // 重置圖片
  uploadedImages = [];
  if (p && p.images) {
    try {
      const imgs = JSON.parse(p.images);
      imgs.forEach(url => uploadedImages.push({ url }));
    } catch(e) {
      if (p.images) uploadedImages.push({ url: p.images });
    }
  }
  renderImgPreview();

  // 填入欄位
  document.getElementById('drawer-title').textContent = p ? '編輯商品' : '新增商品';
  document.getElementById('f-id').value = p ? p.id : '';
  document.getElementById('f-name').value = p ? p.name||'' : '';
  document.getElementById('f-price').value = p ? p.price||'' : '';
  document.getElementById('f-original').value = p ? p.original_price||'' : '';
  document.getElementById('f-deposit').value = p ? p.deposit||'' : '';
  document.getElementById('f-cost').value = p ? p.cost||'' : '';
  document.getElementById('f-supplier').value = p ? p.supplier||'' : '';
  document.getElementById('f-deadline').value = p ? p.deadline||'' : '';
  document.getElementById('f-desc').value = p ? p.description||'' : '';

  // Radio buttons 重置
  document.getElementById('f-type').value = p ? (p.product_type||'preorder') : 'preorder';
  document.getElementById('f-status').value = p ? (p.is_active ? 'active' : 'inactive') : 'active';
  document.getElementById('f-sale').value = p ? String(p.is_sale||false) : 'false';
  resetRadio('type-group', p ? (p.product_type||'preorder') : 'preorder', ['preorder','instock']);
  resetRadio('status-group', p ? (p.is_active ? 'active' : 'inactive') : 'active', ['active','inactive'], true);
  resetRadio('sale-group', p ? String(p.is_sale||false) : 'false', ['true','false'], true);

  // 規格
  specs = p && p.specs ? JSON.parse(p.specs) : [];
  renderSpecs();

  // 分類
  renderCategoryList();
  renderCategorySelects();
  if (p && p.category) {
    document.getElementById('f-category').value = p.category;
    updateSubcategory();
    if (p.subcategory) setTimeout(() => { document.getElementById('f-subcategory').value = p.subcategory; }, 60);
  }

  // 年月
  initDateSelects();
  if (p && p.arrive_year) document.getElementById('f-arrive-year').value = p.arrive_year;
  if (p && p.arrive_month) document.getElementById('f-arrive-month').value = p.arrive_month;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function resetRadio(groupId, value, values, green) {
  const group = document.getElementById(groupId);
  if (!group) return;
  const btns = group.querySelectorAll('.radio-btn');
  btns.forEach((btn, i) => {
    btn.classList.remove('active', 'active-green');
    if (values[i] === value) {
      btn.classList.add('active');
      if (green) btn.classList.add('active-green');
    }
  });
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ===== 商品列表 =====
let products = [];

async function loadProducts() {
  try {
    const res = await fetch(CONFIG.API_URL + '/api/admin/products', { headers: adminHeaders });
    products = await res.json();
    renderProductTable(products);
    const cnt = document.getElementById('product-count');
    if (cnt) cnt.textContent = '共 ' + products.length + ' 件';
  } catch(e) {
    document.getElementById('products-tbody').innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:32px;">載入失敗</td></tr>';
  }
}

function renderProductTable(list) {
  const tb = document.getElementById('products-tbody');
  if (!list.length) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:32px;">目前沒有商品</td></tr>'; return; }
  tb.innerHTML = list.map(p => {
    let thumb = '<div style="width:44px;height:44px;border-radius:8px;background:#f0f6fc;display:flex;align-items:center;justify-content:center;font-size:22px;">📦</div>';
    if (p.images) {
      try { const imgs = JSON.parse(p.images); if (imgs.length) thumb = `<img src="${imgs[0]}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;" />`; } catch(e) {}
    }
    return `<tr>
      <td>${thumb}</td>
      <td style="font-weight:500;">${p.name}</td>
      <td style="color:#888;font-size:12px;">${p.category||'-'}${p.subcategory?'/'+p.subcategory:''}</td>
      <td><span class="badge ${p.product_type==='preorder'?'badge-preorder':'badge-instock'}">${p.product_type==='preorder'?'預購':'現貨'}</span></td>
      <td>NT$${(p.price||0).toLocaleString()}</td>
      <td><span class="badge ${p.is_active?'badge-active':'badge-inactive'}">${p.is_active?'上架':'下架'}</span></td>
      <td>
        <button class="btn-sm btn-edit" onclick="editProduct(${p.id})">編輯</button>
        <button class="btn-sm btn-delete" onclick="deleteProduct(${p.id})">刪除</button>
      </td>
    </tr>`;
  }).join('');
}

function filterTable(q) {
  renderProductTable(products.filter(p => p.name.toLowerCase().includes(q.toLowerCase())));
}

function editProduct(id) {
  openDrawer(products.find(p => p.id === id) || null);
}

async function deleteProduct(id) {
  if (!confirm('確定要刪除這個商品？')) return;
  await fetch(CONFIG.API_URL + '/api/admin/products/' + id, { method: 'DELETE', headers: adminHeaders });
  loadProducts();
}

// ===== 儲存商品 =====
async function doSaveProduct() {
  const name = document.getElementById('f-name').value.trim();
  const price = document.getElementById('f-price').value;
  const desc = document.getElementById('f-desc').value.trim();
  const category = document.getElementById('f-category').value;
  const type = document.getElementById('f-type').value;
  const status = document.getElementById('f-status').value;

  if (!name || !price || !desc || !category) {
    alert('請填寫必填欄位：商品名稱、分類、售價、商品說明');
    return;
  }
  if (uploadedImages.length === 0) {
    alert('請至少上傳一張商品圖片');
    return;
  }

  const btn = document.getElementById('save-btn');
  btn.textContent = '儲存中...';
  btn.disabled = true;

  const id = document.getElementById('f-id').value;
  const body = {
    images: JSON.stringify(uploadedImages.map(i => i.url)),
    name, category,
    subcategory: document.getElementById('f-subcategory').value,
    product_type: type,
    is_active: status === 'active',
    price: Number(price),
    original_price: Number(document.getElementById('f-original').value) || null,
    deposit: Number(document.getElementById('f-deposit').value) || null,
    cost: Number(document.getElementById('f-cost').value) || null,
    supplier: document.getElementById('f-supplier').value,
    arrive_year: document.getElementById('f-arrive-year').value,
    arrive_month: document.getElementById('f-arrive-month').value,
    deadline: document.getElementById('f-deadline').value,
    description: desc,
    is_sale: document.getElementById('f-sale').value === 'true',
    specs: JSON.stringify(specs),
    emoji: '📦',
  };

  try {
    const url = id ? CONFIG.API_URL+'/api/admin/products/'+id : CONFIG.API_URL+'/api/admin/products';
    await fetch(url, { method: id ? 'PUT' : 'POST', headers: adminHeaders, body: JSON.stringify(body) });
    closeDrawer();
    loadProducts();
  } catch(e) {
    alert('儲存失敗，請重試');
  } finally {
    btn.textContent = '儲存商品';
    btn.disabled = false;
  }
}

// ===== 初始化 =====
loadProducts();
</script>
</body>
</html>
