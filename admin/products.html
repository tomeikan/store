<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品管理 - 後台</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-icon">🛍</div><span class="sidebar-logo-text">後台管理</span></div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">主選單</div>
    <a href="index.html" class="sidebar-item"><span class="sidebar-item-icon">📊</span>總覽</a>
    <a href="products.html" class="sidebar-item active"><span class="sidebar-item-icon">📦</span>商品管理</a>
    <a href="orders.html" class="sidebar-item"><span class="sidebar-item-icon">🧾</span>訂單管理</a>
    <a href="notices.html" class="sidebar-item"><span class="sidebar-item-icon">📢</span>公告管理</a>
    <a href="users.html" class="sidebar-item"><span class="sidebar-item-icon">👥</span>會員管理</a>
  </div>
  <div class="sidebar-footer"><a href="../index.html">← 前往前台</a></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title">商品管理</div>
    <div class="topbar-right"><button class="btn-primary" onclick="openDrawer()">+ 新增商品</button></div>
  </div>
  <div class="content">
    <div class="product-table-wrap">
      <div class="table-header">
        <input class="table-search" placeholder="搜尋商品名稱..." oninput="filterTable(this.value)" />
        <span style="font-size:12px;color:#aaa;" id="product-count"></span>
      </div>
      <table>
        <thead><tr><th>圖示</th><th>商品名稱</th><th>分類</th><th>類型</th><th>售價</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="products-tbody"><tr><td colspan="7" style="text-align:center;color:#aaa;padding:32px;">載入中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">新增商品</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <input type="hidden" id="f-id" />
    <div class="form-section">
      <div class="form-section-title">商品圖示</div>
      <div class="form-group">
        <label class="form-label required">Emoji 圖示</label>
        <input class="form-input" id="f-emoji" placeholder="例如 🧸" maxlength="2" style="font-size:24px;text-align:center;" />
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">基本資訊</div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label required">商品類型</label>
          <div class="radio-group" id="type-group">
            <div class="radio-btn active" onclick="setRadio('type','preorder',this)">預購</div>
            <div class="radio-btn" onclick="setRadio('type','instock',this)">現貨</div>
          </div>
          <input type="hidden" id="f-type" value="preorder" />
        </div>
        <div class="form-group">
          <label class="form-label required">上架狀態</label>
          <div class="radio-group" id="status-group">
            <div class="radio-btn active active-green" onclick="setRadio('status','active',this,'green')">上架</div>
            <div class="radio-btn" onclick="setRadio('status','inactive',this,'green')">下架</div>
          </div>
          <input type="hidden" id="f-status" value="active" />
        </div>
      </div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label required">分類</label>
          <select class="form-select" id="f-category" onchange="updateSubcategory()">
            <option value="">選擇分類</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">子分類</label>
          <select class="form-select" id="f-subcategory"><option value="">選擇子分類</option></select>
        </div>
      </div>
      <details style="margin-bottom:14px;">
        <summary style="font-size:12px;color:#378add;cursor:pointer;padding:4px 0;">管理分類與子分類</summary>
        <div style="margin-top:10px;">
          <div class="category-wrap" id="category-list"></div>
          <div class="add-cat-row"><input class="add-cat-input" id="new-cat-input" placeholder="新增分類名稱" /><button class="add-cat-btn" onclick="addCategory()">新增</button></div>
        </div>
      </details>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label required">商品名稱</label>
          <input class="form-input" id="f-name" placeholder="請輸入商品名稱" />
        </div>
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">商品規格</div>
      <div class="spec-table">
        <div class="spec-header"><div>主規格（例如：尺寸）</div><div>子規格（例如：顏色）</div><div></div></div>
        <div id="spec-rows"></div>
      </div>
      <button class="add-spec-btn" onclick="addSpec()">+ 新增規格</button>
    </div>
    <div class="form-section">
      <div class="form-section-title">價格資訊</div>
      <div class="form-row col3">
        <div class="form-group"><label class="form-label required">售價 (NT$)</label><input class="form-input" id="f-price" type="number" placeholder="0" /></div>
        <div class="form-group"><label class="form-label">原價 (NT$)</label><input class="form-input" id="f-original" type="number" placeholder="0" /></div>
        <div class="form-group"><label class="form-label">訂金 (NT$)</label><input class="form-input" id="f-deposit" type="number" placeholder="0" /></div>
      </div>
      <div class="form-row col2">
        <div class="form-group"><label class="form-label">進貨成本 (NT$)</label><input class="form-input" id="f-cost" type="number" placeholder="0" /></div>
        <div class="form-group"><label class="form-label">廠商</label><input class="form-input" id="f-supplier" placeholder="廠商名稱" /></div>
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">時間資訊</div>
      <div class="form-row col2">
        <div class="form-group">
          <label class="form-label">預計到貨時間</label>
          <div class="date-selects">
            <select class="form-select" id="f-arrive-year"></select>
            <select class="form-select" id="f-arrive-month"></select>
          </div>
        </div>
        <div class="form-group"><label class="form-label">結單日期</label><input class="form-input" id="f-deadline" type="date" /></div>
      </div>
    </div>
    <div class="form-section">
      <div class="form-section-title">其他資訊</div>
      <div class="form-group">
        <label class="form-label required">商品說明</label>
        <textarea class="form-textarea" id="f-desc" placeholder="描述商品特色、材質、注意事項等..."></textarea>
      </div>
      <div class="form-row col2" style="margin-top:12px;">
        <div class="form-group">
          <label class="form-label">標示為特賣</label>
          <div class="radio-group" id="sale-group">
            <div class="radio-btn" onclick="setRadio('sale','true',this,'green')">是</div>
            <div class="radio-btn active active-green" onclick="setRadio('sale','false',this,'green')">否</div>
          </div>
          <input type="hidden" id="f-sale" value="false" />
        </div>
      </div>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="btn-cancel" onclick="closeDrawer()">取消</button>
    <button class="btn-primary" onclick="saveProduct()">儲存商品</button>
  </div>
</div>
<script src="../config.js"></script>
<script src="admin.js"></script>
<script>initProductPage();</script>
</body>
</html>
