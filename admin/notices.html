<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>公告管理 - 後台</title><link rel="stylesheet" href="admin.css"/></head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-icon">🛍</div><span class="sidebar-logo-text">後台管理</span></div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">主選單</div>
    <a href="index.html" class="sidebar-item"><span class="sidebar-item-icon">📊</span>總覽</a>
    <a href="products.html" class="sidebar-item"><span class="sidebar-item-icon">📦</span>商品管理</a>
    <a href="orders.html" class="sidebar-item"><span class="sidebar-item-icon">🧾</span>訂單管理</a>
    <a href="notices.html" class="sidebar-item active"><span class="sidebar-item-icon">📢</span>公告管理</a>
    <a href="users.html" class="sidebar-item"><span class="sidebar-item-icon">👥</span>會員管理</a>
  </div>
  <div class="sidebar-footer"><a href="../index.html">← 前往前台</a></div>
</aside>
<div class="main">
  <div class="topbar">
    <div class="topbar-title">公告管理</div>
    <div class="topbar-right"><button class="btn-primary" onclick="openForm()">+ 新增公告</button></div>
  </div>
  <div class="content">
    <div class="product-table-wrap">
      <table>
        <thead><tr><th>標籤</th><th>標題</th><th>發布時間</th><th>操作</th></tr></thead>
        <tbody id="notices-tbody"><tr><td colspan="4" style="text-align:center;color:#aaa;padding:24px;">載入中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeForm()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header"><span class="drawer-title" id="form-title">新增公告</span><button class="drawer-close" onclick="closeForm()">✕</button></div>
  <div class="drawer-body">
    <input type="hidden" id="f-id"/>
    <div class="form-section">
      <div class="form-section-title">公告資訊</div>
      <div class="form-row"><div class="form-group"><label class="form-label required">類型</label>
        <select class="form-select" id="f-tag">
          <option value="new">新品上架</option><option value="sale">促銷活動</option><option value="info">重要通知</option>
        </select>
      </div></div>
      <div class="form-row"><div class="form-group"><label class="form-label required">標題</label><input class="form-input" id="f-title"/></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label required">內容</label><textarea class="form-textarea" id="f-content" style="height:120px;"></textarea></div></div>
    </div>
  </div>
  <div class="drawer-footer"><button class="btn-cancel" onclick="closeForm()">取消</button><button class="btn-primary" onclick="saveNotice()">儲存</button></div>
</div>
<script src="../config.js"></script>
<script>
const h = {'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem('admin_token')||'')};
const tagLabels = {new:'新品上架',sale:'促銷活動',info:'重要通知'};
const tagBadge = {new:'badge-paid',sale:'badge-pending',info:'badge-active'};
let notices = [];
async function load() {
  const res = await fetch(CONFIG.API_URL+'/api/admin/notices',{headers:h});
  notices = await res.json();
  document.getElementById('notices-tbody').innerHTML = notices.map(n=>`
    <tr>
      <td><span class="badge ${tagBadge[n.tag]||''}">${tagLabels[n.tag]||n.tag}</span></td>
      <td style="font-weight:500;">${n.title}</td>
      <td style="font-size:12px;color:#888;">${new Date(n.created_at).toLocaleString('zh-TW')}</td>
      <td><button class="btn-sm btn-edit" onclick="edit(${n.id})">編輯</button><button class="btn-sm btn-delete" onclick="del(${n.id})">刪除</button></td>
    </tr>`).join('');
}
function openForm(n=null) {
  document.getElementById('form-title').textContent = n?'編輯公告':'新增公告';
  document.getElementById('f-id').value = n?n.id:'';
  document.getElementById('f-tag').value = n?n.tag:'new';
  document.getElementById('f-title').value = n?n.title:'';
  document.getElementById('f-content').value = n?n.content:'';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeForm() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }
function edit(id) { openForm(notices.find(n=>n.id===id)); }
async function del(id) { if(!confirm('確定刪除？')) return; await fetch(CONFIG.API_URL+'/api/admin/notices/'+id,{method:'DELETE',headers:h}); load(); }
async function saveNotice() {
  const id = document.getElementById('f-id').value;
  const tag = document.getElementById('f-tag').value;
  const body = {tag,tag_label:tagLabels[tag],title:document.getElementById('f-title').value,content:document.getElementById('f-content').value};
  const url = id?CONFIG.API_URL+'/api/admin/notices/'+id:CONFIG.API_URL+'/api/admin/notices';
  await fetch(url,{method:id?'PUT':'POST',headers:h,body:JSON.stringify(body)});
  closeForm(); load();
}
load();
</script>
</body></html>
