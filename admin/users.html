<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>會員管理 - 後台</title><link rel="stylesheet" href="admin.css"/></head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-icon">🛍</div><span class="sidebar-logo-text">後台管理</span></div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">主選單</div>
    <a href="index.html" class="sidebar-item"><span class="sidebar-item-icon">📊</span>總覽</a>
    <a href="products.html" class="sidebar-item"><span class="sidebar-item-icon">📦</span>商品管理</a>
    <a href="orders.html" class="sidebar-item"><span class="sidebar-item-icon">🧾</span>訂單管理</a>
    <a href="notices.html" class="sidebar-item"><span class="sidebar-item-icon">📢</span>公告管理</a>
    <a href="users.html" class="sidebar-item active"><span class="sidebar-item-icon">👥</span>會員管理</a>
  </div>
  <div class="sidebar-footer"><a href="../index.html">← 前往前台</a></div>
</aside>
<div class="main">
  <div class="topbar"><div class="topbar-title">會員管理</div></div>
  <div class="content">
    <div class="product-table-wrap">
      <table>
        <thead><tr><th>頭像</th><th>名稱</th><th>LINE ID</th><th>加入時間</th></tr></thead>
        <tbody id="users-tbody"><tr><td colspan="4" style="text-align:center;color:#aaa;padding:24px;">載入中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<script src="../config.js"></script>
<script>
const h = {'Authorization':'Bearer '+(localStorage.getItem('admin_token')||'')};
async function load() {
  const res = await fetch(CONFIG.API_URL+'/api/admin/users',{headers:h});
  const users = await res.json();
  document.getElementById('users-tbody').innerHTML = users.map(u=>`
    <tr>
      <td>${u.picture?`<img src="${u.picture}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`:'<div style="width:36px;height:36px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:14px;color:#185fa5;">👤</div>'}</td>
      <td style="font-weight:500;">${u.display_name||'-'}</td>
      <td style="font-size:12px;color:#888;">${u.line_id}</td>
      <td style="font-size:12px;color:#888;">${new Date(u.created_at).toLocaleDateString('zh-TW')}</td>
    </tr>`).join('');
}
load();
</script>
</body></html>
