<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會員管理</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body style="background:#f5f5f0;">
  <nav class="admin-nav">
    <span style="color:white;font-size:16px;font-weight:700;margin-right:24px;">🛍 後台管理</span>
    <a href="index.html">總覽</a>
    <a href="products.html">商品管理</a>
    <a href="orders.html">訂單管理</a>
    <a href="notices.html">公告管理</a>
    <a href="users.html" class="active">會員管理</a>
  </nav>
  <div class="admin-container">
    <h1 class="admin-title">會員管理</h1>
    <table class="data-table">
      <thead><tr><th>頭像</th><th>名稱</th><th>LINE ID</th><th>加入時間</th></tr></thead>
      <tbody id="users-tbody"><tr><td colspan="4" style="text-align:center;color:#aaa;padding:20px;">載入中...</td></tr></tbody>
    </table>
  </div>
  <script src="../config.js"></script>
  <script>
    const token = localStorage.getItem('admin_token') || '';
    const headers = { 'Authorization': `Bearer ${token}` };
    async function load() {
      const res = await fetch(`${CONFIG.API_URL}/api/admin/users`, { headers });
      const users = await res.json();
      document.getElementById('users-tbody').innerHTML = users.map(u => `
        <tr>
          <td>${u.picture ? `<img src="${u.picture}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">` : '<div style="width:36px;height:36px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:16px;">👤</div>'}</td>
          <td>${u.display_name || '-'}</td>
          <td style="font-size:12px;color:#888;">${u.line_id}</td>
          <td style="font-size:13px;">${new Date(u.created_at).toLocaleDateString('zh-TW')}</td>
        </tr>`).join('');
    }
    load();
  </script>
</body>
</html>
