<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>總覽 - 後台</title><link rel="stylesheet" href="admin.css"/></head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="sidebar-logo-icon">🛍</div><span class="sidebar-logo-text">後台管理</span></div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">主選單</div>
    <a href="index.html" class="sidebar-item active"><span class="sidebar-item-icon">📊</span>總覽</a>
    <a href="products.html" class="sidebar-item"><span class="sidebar-item-icon">📦</span>商品管理</a>
    <a href="orders.html" class="sidebar-item"><span class="sidebar-item-icon">🧾</span>訂單管理</a>
    <a href="notices.html" class="sidebar-item"><span class="sidebar-item-icon">📢</span>公告管理</a>
    <a href="users.html" class="sidebar-item"><span class="sidebar-item-icon">👥</span>會員管理</a>
  </div>
  <div class="sidebar-footer"><a href="../index.html">← 前往前台</a></div>
</aside>
<div class="main">
  <div class="topbar"><div class="topbar-title">總覽儀表板</div></div>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">今日訂單</div><div class="stat-value" id="s-orders">-</div></div>
      <div class="stat-card"><div class="stat-label">今日營收</div><div class="stat-value" id="s-revenue">-</div></div>
      <div class="stat-card"><div class="stat-label">商品總數</div><div class="stat-value" id="s-products">-</div></div>
      <div class="stat-card"><div class="stat-label">會員總數</div><div class="stat-value" id="s-users">-</div></div>
    </div>
    <div style="font-size:11px;color:#aaa;letter-spacing:2px;margin-bottom:12px;">最新訂單</div>
    <div class="product-table-wrap">
      <table>
        <thead><tr><th>訂單編號</th><th>會員</th><th>金額</th><th>狀態</th><th>時間</th><th>操作</th></tr></thead>
        <tbody id="orders-tbody"><tr><td colspan="6" style="text-align:center;color:#aaa;padding:24px;">載入中...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<script src="../config.js"></script>
<script>
const h = { 'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem('admin_token')||'') };
async function loadStats() {
  try {
    const res = await fetch(CONFIG.API_URL+'/api/admin/stats',{headers:h});
    const d = await res.json();
    document.getElementById('s-orders').textContent = d.today_orders||0;
    document.getElementById('s-revenue').textContent = 'NT$'+(d.today_revenue||0).toLocaleString();
    document.getElementById('s-products').textContent = d.total_products||0;
    document.getElementById('s-users').textContent = d.total_users||0;
  } catch(e){}
}
async function loadOrders() {
  try {
    const res = await fetch(CONFIG.API_URL+'/api/admin/orders?limit=10',{headers:h});
    const orders = await res.json();
    const statusMap = {pending:'待付款',paid:'已付款',shipped:'已出貨',done:'已完成'};
    const badgeMap = {pending:'badge-pending',paid:'badge-paid',shipped:'badge-shipped',done:'badge-done'};
    document.getElementById('orders-tbody').innerHTML = orders.map(o=>`
      <tr>
        <td>#${o.id}</td><td>${o.user_name||'-'}</td>
        <td>NT$${o.total.toLocaleString()}</td>
        <td><span class="badge ${badgeMap[o.status]||''}">${statusMap[o.status]||o.status}</span></td>
        <td style="font-size:12px;color:#888;">${new Date(o.created_at).toLocaleString('zh-TW')}</td>
        <td>
          <select onchange="updateStatus(${o.id},this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid #e8f0f8;font-size:12px;outline:none;">
            <option value="pending" ${o.status==='pending'?'selected':''}>待付款</option>
            <option value="paid" ${o.status==='paid'?'selected':''}>已付款</option>
            <option value="shipped" ${o.status==='shipped'?'selected':''}>已出貨</option>
            <option value="done" ${o.status==='done'?'selected':''}>已完成</option>
          </select>
        </td>
      </tr>`).join('');
  } catch(e){}
}
async function updateStatus(id,status) { await fetch(CONFIG.API_URL+'/api/admin/orders/'+id,{method:'PATCH',headers:h,body:JSON.stringify({status})}); }
loadStats(); loadOrders();
</script>
</body></html>
