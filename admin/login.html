<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>後台登入</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#f5f8fc;display:flex;align-items:center;justify-content:center;min-height:100vh;}
.box{background:white;border-radius:16px;padding:36px 32px;width:340px;text-align:center;border:1px solid #e8f0f8;}
.box h2{font-size:18px;font-weight:500;margin-bottom:6px;color:#1a1a2e;}
.box p{color:#aaa;font-size:13px;margin-bottom:24px;}
.box input{width:100%;padding:11px 14px;border:1px solid #e8f0f8;border-radius:10px;font-size:14px;outline:none;margin-bottom:14px;color:#1a1a2e;}
.box input:focus{border-color:#378add;}
.box button{width:100%;padding:12px;background:#378add;color:white;border:none;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer;}
.err{color:#e24b4a;font-size:13px;margin-top:10px;display:none;}
</style></head>
<body>
<div class="box">
  <div style="font-size:36px;margin-bottom:14px;">🛍</div>
  <h2>後台管理登入</h2>
  <p>請輸入管理員密碼</p>
  <input type="password" id="pw" placeholder="管理員密碼" onkeydown="if(event.key==='Enter')login()" />
  <button onclick="login()">登入</button>
  <div class="err" id="err">密碼錯誤，請重試</div>
</div>
<script src="../config.js"></script>
<script>
if(localStorage.getItem('admin_token')) location.href='index.html';
async function login() {
  const pw = document.getElementById('pw').value;
  const res = await fetch(CONFIG.API_URL+'/api/auth/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  if(res.ok){const {token}=await res.json();localStorage.setItem('admin_token',token);location.href='index.html';}
  else{document.getElementById('err').style.display='block';}
}
</script>
</body></html>
