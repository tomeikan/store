<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>訂單管理</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body style="background:#f5f5f0;">
  <nav class="admin-nav">
    <span style="color:white;font-size:16px;font-weight:700;margin-right:24px;">🛍 後台管理</span>
    <a href="index.html">總覽</a>
    <a href="products.html">商品管理</a>
    <a href="orders.html" class="active">訂單管理</a>
    <a href="notices.html">公告管理</a>
    <a href="users.html">會員管理</a>
  </nav>
  <div class="admin-container">
    <h1 class="admin-title">訂單管理</h1>
    <table class="data-table">
      <thead><tr><th>訂單編號</th><th>會員</th><th>商品</th><th>金額</th><th>狀態</th><th>時間</th></tr></thead>
      <tbody id="orders-tbody"><tr><td colspan="6" style="text-align:center;color:#aaa;padding:20px;">載入中...</td></tr></tbody>
    </table>
  </div>
  <script src="../config.js"></script>
  <script>
    const token = localStorage.getItem('admin_token') || '';
    const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    async function load() {
      const res = await fetch(`${CONFIG.API_URL}/api/admin/orders`, { headers });
      const orders = await res.json();
      document.getElementById('orders-tbody').innerHTML = orders.map(o => `
        <tr>
          <td>#${o.id}</td>
          <td>${o.user_name || '-'}</td>
          <td style="font-size:13px;">${(o.items||[]).map(i=>`${i.emoji||'📦'}${i.name}×${i.qty}`).join(', ')}</td>
          <td>NT$${o.total.toLocaleString()}</td>
          <td>
            <select onchange="updateStatus(${o.id},this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid #ddd;font-size:13px;">
              <option value="pending" ${o.status==='pending'?'selected':''}>待付款</option>
              <option value="paid" ${o.status==='paid'?'selected':''}>已付款</option>
              <option value="shipped" ${o.status==='shipped'?'selected':''}>已出貨</option>
              <option value="done" ${o.status==='done'?'selected':''}>已完成</option>
            </select>
          </td>
          <td style="font-size:13px;">${new Date(o.created_at).toLocaleString('zh-TW')}</td>
        </tr>`).join('');
    }
    async function updateStatus(id, status) {
      await fetch(`${CONFIG.API_URL}/api/admin/orders/${id}`, { method:'PATCH', headers, body: JSON.stringify({status}) });
    }
    load();
  </script>
</body>
</html>
