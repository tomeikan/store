<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>商品詳情 - 我的小店</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .product-detail { max-width: 640px; margin: 0 auto; padding: 0 0 80px; }

    /* 圖片輪播 */
    .img-gallery { position: relative; background: #f8fbff; }
    .img-main { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .img-main-placeholder { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 80px; background: #f0f7ff; }
    .img-dots { display: flex; justify-content: center; gap: 6px; padding: 10px; position: absolute; bottom: 0; left: 0; right: 0; }
    .img-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s; }
    .img-dot.active { background: white; width: 18px; border-radius: 3px; }
    .img-thumbs { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; background: white; border-bottom: 1px solid #e8f0f8; }
    .img-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: border-color 0.15s; }
    .img-thumb.active { border-color: #378add; }
    .img-thumb-placeholder { width: 60px; height: 60px; border-radius: 8px; background: #f0f7ff; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }

    /* 商品資訊 */
    .product-info-wrap { padding: 18px 16px; background: white; margin-bottom: 8px; }
    .product-badges { display: flex; gap: 8px; margin-bottom: 10px; }
    .product-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .badge-type-preorder { background: #e6f1fb; color: #185fa5; }
    .badge-type-instock { background: #eaf3de; color: #3b6d11; }
    .badge-sale { background: #fcebeb; color: #a32d2d; }
    .product-title { font-size: 20px; font-weight: 500; color: #1a1a2e; margin-bottom: 6px; line-height: 1.4; }
    .product-category { font-size: 12px; color: #aaa; margin-bottom: 14px; }
    .product-price-wrap { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
    .product-price-main { font-size: 26px; font-weight: 500; color: #378add; }
    .product-price-original { font-size: 15px; color: #ccc; text-decoration: line-through; }
    .product-arrive { font-size: 12px; color: #888; margin-top: 4px; }
    .product-deadline { font-size: 12px; color: #e24b4a; margin-top: 4px; }

    /* 規格選擇 */
    .spec-section { padding: 16px; background: white; margin-bottom: 8px; }
    .spec-section-title { font-size: 12px; color: #aaa; letter-spacing: 1px; margin-bottom: 12px; }
    .spec-group { margin-bottom: 14px; }
    .spec-group-label { font-size: 13px; font-weight: 500; color: #1a1a2e; margin-bottom: 8px; }
    .spec-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .spec-option {
      padding: 7px 16px; border: 1px solid #e8f0f8; border-radius: 8px;
      font-size: 13px; cursor: pointer; color: #666; transition: all 0.15s;
    }
    .spec-option:hover { border-color: #378add; color: #378add; }
    .spec-option.selected { border-color: #378add; background: #e6f1fb; color: #185fa5; font-weight: 500; }

    /* 數量 */
    .qty-section { padding: 16px; background: white; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .qty-label { font-size: 13px; font-weight: 500; color: #1a1a2e; }
    .qty-ctrl { display: flex; align-items: center; gap: 14px; }
    .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #e8f0f8; background: white; font-size: 18px; cursor: pointer; color: #378add; display: flex; align-items: center; justify-content: center; }
    .qty-num { font-size: 16px; font-weight: 500; min-width: 28px; text-align: center; }

    /* 描述 */
    .desc-section { padding: 16px; background: white; margin-bottom: 8px; }
    .desc-title { font-size: 12px; color: #aaa; letter-spacing: 1px; margin-bottom: 12px; }
    .desc-content { font-size: 14px; color: #444; line-height: 1.8; white-space: pre-line; }

    /* 底部按鈕 */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #e8f0f8;
      padding: 12px 16px; display: flex; gap: 10px;
      z-index: 50;
    }
    .btn-cart {
      flex: 1; padding: 13px; background: white; color: #378add;
      border: 1.5px solid #378add; border-radius: 24px;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .btn-buy {
      flex: 1; padding: 13px; background: #378add; color: white;
      border: none; border-radius: 24px;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }

    /* 返回按鈕 */
    .back-btn {
      position: absolute; top: 14px; left: 14px; z-index: 10;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.9); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #1a1a2e; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    /* 載入骨架 */
    .skeleton { background: linear-gradient(90deg,#f0f6fc 25%,#e6f0f9 50%,#f0f6fc 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 8px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>
  <nav class="navbar" style="position:relative;">
    <button class="back-btn" style="position:static;box-shadow:none;background:none;font-size:20px;" onclick="history.back()">←</button>
    <div class="nav-logo">商品詳情</div>
    <div class="nav-right">
      <div class="cart-icon" onclick="location.href='cart.html'">🛒 <span class="cart-badge" id="cart-count">0</span></div>
    </div>
  </nav>

  <div class="product-detail" id="product-detail">
    <!-- 載入骨架 -->
    <div style="aspect-ratio:1;background:#f0f6fc;"></div>
    <div style="padding:18px 16px;background:white;margin-bottom:8px;">
      <div class="skeleton" style="height:18px;width:60%;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:28px;width:40%;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:14px;width:80%;"></div>
    </div>
  </div>

  <div class="bottom-bar" id="bottom-bar" style="display:none;">
    <button class="btn-cart" onclick="addToCartFromDetail()">加入購物車</button>
    <button class="btn-buy" onclick="buyNow()">立即購買</button>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    let currentProduct = null;
    let currentQty = 1;
    let currentImgIndex = 0;
    let productImages = [];

    async function loadProduct() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) { location.href = 'index.html'; return; }

      try {
        const res = await fetch(`${CONFIG.API_URL}/api/products/${id}`);
        if (!res.ok) throw new Error('not found');
        currentProduct = await res.json();
        renderProduct(currentProduct);
      } catch(e) {
        document.getElementById('product-detail').innerHTML = '<div style="text-align:center;padding:60px 20px;color:#aaa;">商品不存在</div>';
      }
    }

    function renderProduct(p) {
      // 解析圖片
      productImages = [];
      if (p.images) {
        try { productImages = JSON.parse(p.images); } catch(e) { if(p.images) productImages = [p.images]; }
      }

      // 解析規格
      let specs = [];
      if (p.specs) { try { specs = JSON.parse(p.specs); } catch(e) {} }
      const mainSpecs = [...new Set(specs.map(s => s.main).filter(Boolean))];
      const subSpecs = [...new Set(specs.map(s => s.sub).filter(Boolean))];

      // 解析到貨時間
      let arriveText = '';
      if (p.arrive_year && p.arrive_month) arriveText = `預計 ${p.arrive_year} 年 ${p.arrive_month} 月到貨`;
      else if (p.arrive_year) arriveText = `預計 ${p.arrive_year} 年到貨`;

      // 結單日期
      let deadlineText = '';
      if (p.deadline) {
        const d = new Date(p.deadline);
        deadlineText = `結單日期：${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
      }

      const html = `
        <!-- 圖片區 -->
        <div class="img-gallery" style="position:relative;">
          <button class="back-btn" onclick="history.back()">←</button>
          ${productImages.length
            ? `<img class="img-main" id="img-main" src="${productImages[0]}" alt="${p.name}" />`
            : `<div class="img-main-placeholder">${p.emoji || '📦'}</div>`
          }
          ${productImages.length > 1 ? `<div class="img-dots">${productImages.map((_,i) => `<div class="img-dot ${i===0?'active':''}" onclick="switchImg(${i})"></div>`).join('')}</div>` : ''}
        </div>

        ${productImages.length > 1 ? `
        <div class="img-thumbs">
          ${productImages.map((src,i) => `<img class="img-thumb ${i===0?'active':''}" src="${src}" onclick="switchImg(${i})" />`).join('')}
        </div>` : ''}

        <!-- 商品資訊 -->
        <div class="product-info-wrap">
          <div class="product-badges">
            <span class="product-badge ${p.product_type==='preorder'?'badge-type-preorder':'badge-type-instock'}">${p.product_type==='preorder'?'預購':'現貨'}</span>
            ${p.is_sale ? '<span class="product-badge badge-sale">特賣</span>' : ''}
          </div>
          <div class="product-title">${p.name}</div>
          <div class="product-category">${p.category||''}${p.subcategory?' / '+p.subcategory:''}</div>
          <div class="product-price-wrap">
            <span class="product-price-main">NT$${(p.price||0).toLocaleString()}</span>
            ${p.original_price ? `<span class="product-price-original">NT$${p.original_price.toLocaleString()}</span>` : ''}
          </div>
          ${arriveText ? `<div class="product-arrive">🚚 ${arriveText}</div>` : ''}
          ${deadlineText ? `<div class="product-deadline">⏰ ${deadlineText}</div>` : ''}
        </div>

        <!-- 規格 -->
        ${mainSpecs.length || subSpecs.length ? `
        <div class="spec-section">
          <div class="spec-section-title">選擇規格</div>
          ${mainSpecs.length ? `
          <div class="spec-group">
            <div class="spec-group-label">主規格</div>
            <div class="spec-options">
              ${mainSpecs.map(s => `<div class="spec-option" onclick="selectSpec(this,'main')">${s}</div>`).join('')}
            </div>
          </div>` : ''}
          ${subSpecs.length ? `
          <div class="spec-group">
            <div class="spec-group-label">子規格</div>
            <div class="spec-options">
              ${subSpecs.map(s => `<div class="spec-option" onclick="selectSpec(this,'sub')">${s}</div>`).join('')}
            </div>
          </div>` : ''}
        </div>` : ''}

        <!-- 數量 -->
        <div class="qty-section">
          <span class="qty-label">購買數量</span>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-num" id="detail-qty">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>

        <!-- 商品描述 -->
        ${p.description ? `
        <div class="desc-section">
          <div class="desc-title">商品說明</div>
          <div class="desc-content">${p.description}</div>
        </div>` : ''}
      `;

      document.getElementById('product-detail').innerHTML = html;
      document.getElementById('bottom-bar').style.display = 'flex';
      updateCartBadge();
    }

    function switchImg(i) {
      currentImgIndex = i;
      const mainImg = document.getElementById('img-main');
      if (mainImg) mainImg.src = productImages[i];
      document.querySelectorAll('.img-dot').forEach((d,idx) => d.classList.toggle('active', idx===i));
      document.querySelectorAll('.img-thumb').forEach((t,idx) => t.classList.toggle('active', idx===i));
    }

    function selectSpec(el, type) {
      const parent = el.closest('.spec-options');
      parent.querySelectorAll('.spec-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    }

    function changeQty(d) {
      currentQty = Math.max(1, currentQty + d);
      document.getElementById('detail-qty').textContent = currentQty;
    }

    function addToCartFromDetail() {
      if (!currentProduct) return;
      addItemToCart(currentProduct, currentQty);
      showToast(`已加入 ${currentProduct.name} ×${currentQty}`);
    }

    function buyNow() {
      if (!currentProduct) return;
      addItemToCart(currentProduct, currentQty);
      location.href = 'cart.html';
    }

    loadProduct();
  </script>
</body>
</html>
